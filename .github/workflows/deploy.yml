name: Deploy

# Promote through environments:
#   - push to main            -> deploy to `dev`
#   - manual run (workflow_dispatch) -> deploy to dev / test / prod, each gated
#                                by its GitHub Environment (add required
#                                reviewers on `prod` for an approval gate).
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: Bundle target to deploy
        type: choice
        options: [dev, test, prod]
        default: dev

concurrency:
  group: deploy-${{ github.event.inputs.target || 'dev' }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy (${{ github.event.inputs.target || 'dev' }})
    runs-on: ubuntu-latest
    # Skips cleanly until deploys are enabled: set repo variable
    # DEPLOY_ENABLED=true and add the DATABRICKS_* secrets per environment.
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    # Resolves credentials from the matching GitHub Environment (dev/test/prod);
    # protection rules on `prod` provide a manual approval gate.
    environment: ${{ github.event.inputs.target || 'dev' }}
    env:
      TARGET: ${{ github.event.inputs.target || 'dev' }}
      # Each workspace uses its own service principal, taken from the Environment
      # above. The workspace host comes from the bundle target in databricks.yml.
      DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
      DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Validate bundle
        run: databricks bundle validate --target "$TARGET"

      - name: Deploy bundle
        run: databricks bundle deploy --target "$TARGET"
