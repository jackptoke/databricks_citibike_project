name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint & unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Unit tests
        # Integration tests auto-skip without a Databricks workspace configured.
        run: uv run pytest -m "not integration" -q

  validate-bundle:
    name: Validate bundle (${{ matrix.target }})
    runs-on: ubuntu-latest
    # Only runs when Databricks credentials are configured (per-environment).
    if: ${{ vars.DATABRICKS_CI_ENABLED == 'true' }}
    strategy:
      matrix:
        target: [dev, test]
    # Pulls DATABRICKS_CLIENT_ID/SECRET from the matching GitHub Environment,
    # so each workspace uses its own service principal. The host comes from
    # the bundle target in databricks.yml — no DATABRICKS_HOST needed here.
    environment: ${{ matrix.target }}
    env:
      DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
      DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Validate bundle
        run: databricks bundle validate --target ${{ matrix.target }}
